node {
  name = "emqx@node1"
  cookie = "emqxsecretcookie123"
  data_dir = "/opt/emqx/data"
}

listeners.tcp.default {
  bind = "0.0.0.0:2883"
  # Disable anonymous access for TCP listener
  enable_authn = true
  access.1 = "allow all"
}

listeners.ws.default {
  bind = "0.0.0.0:9083"
  # Disable anonymous access for WebSocket listener
  enable_authn = true
  access.1 = "allow all"
}

dashboard {
  listeners.http {
    bind = 18083
  }
  default_username = "admin"
  default_password = "TOYJO67tyu567"
}

# Authentication configuration - explicitly disable anonymous access
authentication {
  enable = true
  backend = "built_in_database"
  mechanism = "password_based"
  allow_anonymous = false  # <-- This is the key setting to add
}

# Authorization configuration
authorization {
  cache {
    enable = true
    max_size = 32
    ttl = 1m
  }
  sources = [
    {
      type = "file"
      enable = true
      path = "etc/acl.conf"
    },
    {
      type = "built_in_database"
      enable = true
    }
  ]
  no_match = deny
}

listeners.ssl.default {
  enabled = false
}

listeners.wss.default {
  enabled = false
}