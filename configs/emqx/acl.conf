# Allow dashboard user to access system topics
{allow, {user, "dashboard"}, subscribe, ["$SYS/#"]}.

# Allow devices to publish only to their own tenant/branch topics
# %u will be replaced with the username of the connecting client
{allow, {user, "%u"}, publish, ["%u/#"]}.

# Allow devices to subscribe only to their own tenant/branch topics
{allow, {user, "%u"}, subscribe, ["%u/#"]}.

# Deny all other access by default
{deny, all, publish, ["#"]}.
{deny, all, subscribe, ["#"]}.